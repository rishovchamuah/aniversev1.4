<!DOCTYPE html>
<html lang="en">

<head>
  
<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>AniVerse | Profile</title>

<link rel="stylesheet"
href="profile.css">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">

  <link rel="stylesheet" href="components/toast.css">

</head>

<body>

<div class="background"></div>

<header class="navbar">

<div class="logo">

<i class="fa-solid fa-user"></i>

<span>AniVerse</span>

</div>

<a href="index.html">

<i class="fa-solid fa-house"></i>

Home

</a>

</header>

<section class="profile">

<div class="profileCard">

<img
src="https://api.dicebear.com/9.x/thumbs/svg?seed=AniVerse"
class="avatar">

<h1 id="username">

Loading...

</h1>

<p>

Welcome back!

</p>

<button id="editUsername">

<i class="fa-solid fa-pen"></i>

Edit Username

</button>

<small id="usernameInfo">

You can change your username once every 14 days.

</small>

</div>

<div class="stats">

<div class="stat">

<h2 id="watchlistCount">

0

</h2>

<span>Watchlist</span>

</div>

<div class="stat">

<h2 id="favoritesCount">

0

</h2>

<span>Favorites</span>

</div>

<div class="stat">

<h2 id="recentCount">

0

</h2>

<span>Recently Viewed</span>

</div>

</div>

</section>

<script src="components/toast.js"></script>
<script src="profile.js"></script>

</body>

</html>
