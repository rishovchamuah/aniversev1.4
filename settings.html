<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>AniVerse | Settings</title>

<link rel="stylesheet"
href="settings.css">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">

  <link rel="stylesheet" href="components/toast.css">

</head>

<body>

<div class="background"></div>

<header class="navbar">

<div class="logo">

<i class="fa-solid fa-gear"></i>

<span>AniVerse</span>

</div>

<a href="index.html">

<i class="fa-solid fa-house"></i>

Home

</a>

</header>

<section class="settings">

<h1>Settings</h1>

<div class="settingCard">

<label>

Dark Mode

</label>

<input
type="checkbox"
id="darkMode">

</div>

<div class="settingCard">

<label>

Animations

</label>

<input
type="checkbox"
id="animations"
checked>

</div>

<div class="settingCard">

<label>

Card Size

</label>

<select id="cardSize">

<option value="small">

Small

</option>

<option
value="normal"
selected>

Normal

</option>

<option value="large">

Large

</option>

</select>

</div>

</section>

<script src="components/toast.js"></script>
<script src="settings.js"></script>

</body>

</html>
