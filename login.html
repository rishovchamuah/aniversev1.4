<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AniVerse - Login</title>

    <link rel="stylesheet" href="style.css">
</head>

<body>

<div class="background"></div>

<div class="login-box">

    <h1>AniVerse</h1>
    <p>Premium Anime Tracker</p>

    <form id="loginForm">

        <input
            type="text"
            id="username"
            placeholder="Username"
            required
        >

        <input
            type="password"
            id="password"
            placeholder="Password"
            required
        >

        <button type="submit">
            Login
        </button>

        <p id="message"></p>

    </form>

</div>

<script src="login.js"></script>

</body>
</html>
